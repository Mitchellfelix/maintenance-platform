<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect to EMAT</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --card: #0f172a;
        --border: #334155;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #f97316;
        --accent-text: #fff7ed;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(249, 115, 22, 0.18), transparent 40%),
          linear-gradient(160deg, #020617 0%, #0f172a 55%, #111827 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }
      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #fdba74;
        font-weight: 700;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        background: #020617;
        color: var(--text);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 15px;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
      }
      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(90deg, #f97316, #f59e0b);
        color: white;
        font-weight: 700;
        font-size: 15px;
        padding: 12px 16px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .error {
        margin-top: 12px;
        color: #fda4af;
        font-size: 14px;
        min-height: 1.2em;
      }
      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">EMAT Tracking Database</p>
      <h1>Connect to your team</h1>
      <p>
        Paste the Team URL from your host (the same address as the join page). You only need to do this
        once.
      </p>
      <form id="form">
        <label for="url">Team URL</label>
        <input
          id="url"
          name="url"
          type="url"
          required
          placeholder="http://192.168.1.50:3000"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="submit" type="submit">Connect</button>
        <div class="error" id="error"></div>
      </form>
      <p class="hint">Tip: ask your host for the Join link — it looks like <code>http://…:3000/join</code>. Use the base URL without <code>/join</code>.</p>
    </main>
    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("url");
      const error = document.getElementById("error");
      const submit = document.getElementById("submit");

      (async () => {
        try {
          const existing = await window.ematTeam.getUrl();
          if (existing) input.value = existing;
        } catch {
          // ignore
        }
      })();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        submit.disabled = true;
        try {
          let url = input.value.trim().replace(/\/+$/, "");
          if (url.endsWith("/join")) url = url.slice(0, -5);
          await window.ematTeam.saveUrl(url);
        } catch (err) {
          error.textContent = err?.message || "Unable to save Team URL";
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
