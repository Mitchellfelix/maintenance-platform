name: maintenance-platform

services:
  db:
    image: postgres:16-alpine
    container_name: maintenance-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maintenance
      POSTGRES_PASSWORD: maintenance
      POSTGRES_DB: maintenance_platform
    ports:
      - "5432:5432"
    volumes:
      - maintenance_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintenance -d maintenance_platform"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    profiles:
      - team
    build: .
    container_name: maintenance-platform-app
    restart: unless-stopped
    ports:
      - "${EMAT_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://maintenance:maintenance@db:5432/maintenance_platform
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    env_file:
      - path: server/.env
        required: false
    volumes:
      - maintenance_platform_uploads:/app/server/uploads
      - ./server/public/downloads:/app/server/public/downloads:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/db').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

volumes:
  maintenance_platform_pgdata:
  maintenance_platform_uploads:
