services:
  db:
    image: postgres:16-alpine
    container_name: maintenance-platform-db
    environment:
      POSTGRES_USER: maintenance
      POSTGRES_PASSWORD: maintenance
      POSTGRES_DB: maintenance_platform
    ports:
      - "5432:5432"
    volumes:
      - maintenance_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintenance -d maintenance_platform"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  maintenance_platform_pgdata:
