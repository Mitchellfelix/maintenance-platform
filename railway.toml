# Railway service config for the EMAT web app.
# Create a Postgres plugin in the same project and attach DATABASE_URL.
# Mount a volume at /data (see docs/RAILWAY.md) for uploads + Mac downloads.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./docker-entrypoint.sh"
healthcheckPath = "/api/health/db"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Set these in the Railway dashboard (or `railway variables`):
#   JWT_SECRET          — strong random secret
#   EMAT_APP_URL        — https://YOUR-APP.up.railway.app
#   APP_URL             — same as EMAT_APP_URL
#   CORS_ORIGIN         — true   (or your public origin)
#   EMAT_DATA_DIR       — /data  (when volume is mounted at /data)
#   HOST                — 0.0.0.0
# DATABASE_URL is injected by the Postgres plugin.
